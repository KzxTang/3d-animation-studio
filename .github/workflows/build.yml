name: Android 3D Animation Studio CI/CD

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        default: 'debug'
        options:
          - debug
          - release
      upload_artifact:
        description: 'Upload APK as artifact'
        required: false
        type: boolean
        default: true

env:
  JAVA_VERSION: '17'
  NDK_VERSION: '26.2.11394342'
  SDK_COMPILE: 34
  SDK_BUILD_TOOLS: '34.0.0'
  CMAKE_VERSION: '3.22.1'

jobs:
  build-and-package:
    name: Build & Package APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-${{ env.SDK_COMPILE }}
            build-tools;${{ env.SDK_BUILD_TOOLS }}
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
            platform-tools
            emulator
      
      - name: Verify Environment
        run: |
          echo "=== Java ==="
          java -version
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo "=== NDK ==="
          ls -la $ANDROID_HOME/ndk/
          echo "=== SDK Platforms ==="
          ls -la $ANDROID_HOME/platforms/
          echo "=== Build Tools ==="
          ls -la $ANDROID_HOME/build-tools/
      
      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x ./gradlew
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> local.properties
          cat local.properties
      
      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Determine Build Type
        id: build-config
        run: |
          if [ "${{ github.event.inputs.build_type }}" != "" ]; then
            echo "BUILD_VARIANT=${{ github.event.inputs.build_type }}" >> $GITHUB_ENV
          else
            echo "BUILD_VARIANT=debug" >> $GITHUB_ENV
          fi
          echo "Selected build variant: ${{ env.BUILD_VARIANT }}"
      
      - name: Build APK (Debug)
        if: env.BUILD_VARIANT == 'debug'
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.signing.store=false \
            -Pandroid.injected.signing.alias=false
      
      - name: Build APK (Release)
        if: env.BUILD_VARIANT == 'release'
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.signing.store=false \
            -Pandroid.injected.signing.alias=false
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      - name: Collect APK Files
        run: |
          mkdir -p apk-output
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk apk-output/3DAnimationStudio-debug.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk apk-output/3DAnimationStudio-release-unsigned.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk apk-output/3DAnimationStudio-release.apk
          fi
          echo "=== APK Files ==="
          ls -lh apk-output/
      
      - name: Upload APK Artifact
        if: github.event.inputs.upload_artifact != 'false' || github.event.inputs.upload_artifact == ''
        uses: actions/upload-artifact@v4
        with:
          name: 3DAnimationStudio-${{ env.BUILD_VARIANT }}-${{ github.run_number }}
          path: apk-output/*.apk
          retention-days: 30
          compression-level: 6
      
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type:** ${{ env.BUILD_VARIANT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "### Download APK from Artifacts section above" >> $GITHUB_STEP_SUMMARY

  lint-and-test:
    name: Lint & Test Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: []
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-${{ env.SDK_COMPILE }}
            build-tools;${{ env.SDK_BUILD_TOOLS }}
            ndk;${{ env.NDK_VERSION }}
            cmake;${{ env.CMAKE_VERSION }}
      
      - name: Run Lint
        continue-on-error: true
        run: |
          chmod +x ./gradlew
          ./gradlew lintDebug --no-daemon --stacktrace
      
      - name: Run Unit Tests
        continue-on-error: true
        run: |
          ./gradlew testDebugUnitTest --no-daemon --stacktrace
      
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
